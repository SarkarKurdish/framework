name: pre release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease

jobs:
  trigger_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        id: bump
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"

          if echo "$RELEASE_TYPE" | grep -q "^pre"; then
            npm version "$RELEASE_TYPE" --preid=beta --no-git-tag-version
          else
            npm version "$RELEASE_TYPE" --no-git-tag-version
          fi

          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        run: |
          TAG="v${{ steps.bump.outputs.version }}"

          git add package.json package-lock.json
          git commit -m "chore: release $TAG"

          git tag "$TAG"
          git push --tags

      - name: Summary
        run: |
          {
            echo "## Release triggered"
            echo ""
            echo "- Version: \`${{ steps.bump.outputs.version }}\`"
            echo "- Tag: \`v${{ steps.bump.outputs.version }}\`"
            echo "- Publishing workflow will run automatically"
          } >> "$GITHUB_STEP_SUMMARY"