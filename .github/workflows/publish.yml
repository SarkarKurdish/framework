name: publish to npm and github

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish_release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    env:
      PACKAGE_NAME: "@omss/framework"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm for OIDC publishing compatibility
        run: npm install -g npm@latest

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on npm
        id: npm_check
        run: |
          if npm view "${PACKAGE_NAME}@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Already published on npm — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.npm_check.outputs.published != 'true'
        run: npm ci

      - name: Build
        if: steps.npm_check.outputs.published != 'true'
        run: npm run build

      - name: Test
        if: steps.npm_check.outputs.published != 'true'
        run: npm run test:unit

      - name: Publish to npm
        if: steps.npm_check.outputs.published != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if echo "$VERSION" | grep -q -- "-beta\."; then
            npm publish --provenance --tag beta --access public
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists — skipping"
            exit 0
          fi

          if echo "$VERSION" | grep -q -- "-beta\."; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --prerelease
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi